name: Integration tests (Artemis)
on:
  push:
    branches:
      - '*'
jobs:
  artemis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start Artemis container
        run: docker compose -f integration/docker-compose.yml up artemis -d --wait
      - name: Run Artemis integration spec
        env:
          SKIP_BROKER_SETUP: '1'
          KEEP_BROKERS: '1'
          AMQP_ARTEMIS_URL: amqp://artemis:artemis@localhost:5675
        run: npx jest --config integration/jest.config.js integration/specs/artemis.spec.ts
      - name: Dump Artemis logs on failure
        if: failure()
        run: docker compose -f integration/docker-compose.yml logs artemis --no-color
      - name: Teardown
        if: always()
        run: docker compose -f integration/docker-compose.yml down -v
